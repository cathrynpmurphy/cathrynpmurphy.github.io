title: "Cathryn P. Murphy"
description: "Academic Profile & Research"
url: "https://cathrynpmurphy.github.io"
baseurl: ""
author:
  name: "Cathryn P. Murphy"

# Remote theme compatible with GitHub Pages
remote_theme: "mmistakes/minimal-mistakes@4.26.2"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jemoji
  - jekyll-remote-theme
  - jekyll-include-cache 

# Theme settings
minimal_mistakes_skin: "default"

# Site settings
locale: "en-US"
repository: "cathrynpmurphy/cathrynpmurphy.github.io"

# Navigation
header_pages:
  - about.md
  - research.md
  - cv.md
  - interests.md

# Pagination
paginate: 5
paginate_path: /page:num/

# Markdown
markdown: kramdown
highlighter: rouge

# Exclude from processing
exclude:
  - .github
  - Gemfile
  - Gemfile.lock
  - node_modules
