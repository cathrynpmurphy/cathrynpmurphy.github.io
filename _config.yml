title: "Cathryn P. Murphy"
description: "Academic Profile & Research"
url: "https://cathrynpmurphy.github.io"
baseurl: ""
author:
  name: "Cathryn P. Murphy"

# Remote theme compatible with GitHub Pages
remote_theme: "mmistakes/minimal-mistakes@4.26.2"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jemoji
  - jekyll-remote-theme
  - jekyll-include-cache 

# Theme settings
minimal_mistakes_skin: "air"

# Site settings
locale: "en-US"
repository: "cathrynpmurphy/cathrynpmurphy.github.io"

#Author Page
author:
  name: "Cathryn (Kate) P. Murphy"
  avatar: "/assets/images/SailboatPhoto.jpeg"  # your photo
  bio: "Your one-line bio here"
  email: "CathrynMurphy2027@u.northwestern.edu"
  links:
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=FIQ_jgIAAAAJ&hl=en"
    - label: "CV"
      icon: "fas fa-fw fa-file-pdf"
      url: "/cv/"

# Navigation
header_pages:
  - about.md
  - research.md
  - cv.md
  - interests.md

# Pagination
paginate: 5
paginate_path: /page:num/

# Markdown
markdown: kramdown
highlighter: rouge

# Exclude from processing
exclude:
  - .github
  - Gemfile
  - Gemfile.lock
  - node_modules
